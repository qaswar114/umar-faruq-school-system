{% extends "base.html" %}

{% block content %}
<div class="panel">
    <h2>Edit Pupil</h2>

<form method="post" enctype="multipart/form-data">
    <div class="two">
        <div>
            <label>Full Name</label>
            <input name="full_name" value="{{ pupil.full_name }}" required>
            <label>Student Photo</label>
            <input type="file" name="photo" accept="image/*">

{% if pupil.photo %}
    <img src="{{ url_for('static', filename='uploads/' + pupil.photo) }}"
         width="120"
         style="margin-top:10px;border-radius:8px;">
{% endif %}

            <label>Gender</label>
            <select name="gender">
                <option {% if pupil.gender=="Male" %}selected{% endif %}>Male</option>
                <option {% if pupil.gender=="Female" %}selected{% endif %}>Female</option>
            </select>

            <label>DOB</label>
            <input name="dob" type="date" value="{{ pupil.dob }}">

            <label>Grade</label>
            <select name="grade">
                {% for g in grades %}
                <option value="{{g}}" {% if pupil.grade==g %}selected{% endif %}>{{g}}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label>Guardian Name</label>
            <input name="guardian_name" value="{{ pupil.guardian_name }}" required>

            <label>Guardian Phone</label>
            <input name="guardian_phone" value="{{ pupil.guardian_phone }}" required>

            <label>Uses School Bus?</label>
            <select name="uses_bus">
                <option {% if pupil.uses_bus=="No" %}selected{% endif %}>No</option>
                <option {% if pupil.uses_bus=="Yes" %}selected{% endif %}>Yes</option>
            </select>

            <label>Status</label>
            <select name="status">
                <option {% if pupil.status=="Active" %}selected{% endif %}>Active</option>
                <option {% if pupil.status=="Inactive" %}selected{% endif %}>Inactive</option>
            </select>
        </div>
    </div>

    <label>Home Address</label>
    <textarea name="home_address">{{ pupil.home_address }}</textarea>

    <button class="btn green">Update Pupil</button>
</form>
</div>
{% endblock %}
