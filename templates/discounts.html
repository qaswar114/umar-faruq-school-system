{% extends "base.html" %}{% block content %}<div class="panel"><h2>Discounts / Waivers</h2><form method="post"><label>Pupil</label><select name="pupil_id">{% for p in pupils %}<option value="{{p.id}}">{{p.admission_no}} - {{p.full_name}}</option>{% endfor %}</select><div class="three"><div><label>Academic Year</label><input name="academic_year" type="number" value="{{year}}"></div><div><label>Term</label><select name="term"><option>All Year</option><option>Term 1</option><option>Term 2</option><option>Term 3</option></select></div><div><label>Amount</label><input name="amount" type="number"></div></div><label>Reason</label><input name="reason"><button class="btn green">Add Discount/Waiver</button></form></div><div class="panel"><table><tr><th>Year</th><th>Pupil</th><th>Term</th><th>Amount</th><th>Reason</th></tr>{% for d in discounts %}<tr><td>{{d.academic_year}}</td><td>{{d.pupil.full_name}}</td><td>{{d.term}}</td><td>{{money(d.amount)}}</td><td>{{d.reason}}</td></tr>{% endfor %}</table></div>{% endblock %}
