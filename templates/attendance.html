{% extends "base.html" %}

{% block content %}
<div class="panel">
    <h2>Attendance Register</h2>

    <form method="get" class="two">
        <div>
            <label>Select Grade</label>
            <select name="grade" required>
                <option value="">Choose Grade</option>
                {% for g in grades %}
                <option value="{{g}}" {% if selected_grade == g %}selected{% endif %}>{{g}}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label>Date</label>
            <input type="date" name="attendance_date" value="{{attendance_date}}" required>
        </div>

        <div>
            <button class="btn blue">Load Pupils</button>
        </div>
    </form>
</div>

{% if pupils %}
<div class="panel">
    <h3>{{selected_grade}} Attendance</h3>

    <form method="post">
        <input type="hidden" name="grade" value="{{selected_grade}}">
        <input type="hidden" name="attendance_date" value="{{attendance_date}}">

        <table>
            <tr>
                <th>No.</th>
                <th>Admission</th>
                <th>Name</th>
                <th>Status</th>
            </tr>

            {% for p in pupils %}
            <tr>
                <td>{{loop.index}}</td>
                <td>{{p.admission_no}}</td>
                <td>{{p.full_name}}</td>
                <td>
                    <select name="status_{{p.id}}">
                        <option value="Present">Present</option>
                        <option value="Absent">Absent</option>
                        <option value="Late">Late</option>
                    </select>
                </td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <button class="btn green">Save Attendance</button>
    </form>
</div>
{% endif %}
{% endblock %}
