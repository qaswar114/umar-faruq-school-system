{% extends "base.html" %}
{% block content %}

<div class="panel">
    <h2>WhatsApp Settings</h2>
    <p>Configure WhatsApp Business API for {{ school.school_name }}.</p>

    <form method="post">

        <label>
            <input type="checkbox" name="whatsapp_enabled"
                   {% if school.whatsapp_enabled %}checked{% endif %}>
            Enable WhatsApp for this school
        </label>

        <label>Sender Name</label>
        <input name="whatsapp_sender_name"
               value="{{ school.whatsapp_sender_name or school.school_name }}">

        <label>Phone Number ID</label>
        <input name="whatsapp_phone_number_id"
               value="{{ school.whatsapp_phone_number_id or '' }}">

        <label>WhatsApp Business Account ID</label>
        <input name="whatsapp_business_account_id"
               value="{{ school.whatsapp_business_account_id or '' }}">

        <label>Access Token</label>
        <textarea name="whatsapp_access_token" rows="5">{{ school.whatsapp_access_token or '' }}</textarea>

        <br><br>

        <button class="btn green" type="submit">Save WhatsApp Settings</button>
    </form>
</div>

{% endblock %}
