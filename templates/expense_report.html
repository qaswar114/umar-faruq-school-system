{% extends "base.html" %}
{% block content %}

<div class="panel">
    <h2>Expense Report</h2>
    <button type="button" class="btn green" onclick="window.print()">Print</button>
</div>

<div class="panel">
    <h3>Total Expenses: {{ money(total) }}</h3>

    <table>
        <tr>
            <th>No.</th>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Amount</th>
        </tr>

        {% for r in rows %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ r.expense_date }}</td>
            <td>{{ r.category }}</td>
            <td>{{ r.description }}</td>
            <td>{{ money(r.amount) }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
