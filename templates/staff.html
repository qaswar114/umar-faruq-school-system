<form method="post">

<div class="three">

<div>
<label>Full Name</label>
<input name="full_name" required placeholder="e.g. Teacher Amina Hassan">
</div>

<div>
<label>Phone</label>
<input name="phone" placeholder="07xxxxxxxx">
</div>

<div>
<label>Email</label>
<input type="email" name="email">
</div>

<div>
<label>ID Number</label>
<input name="id_no">
</div>

<div>
<label>Role</label>
<select name="role" required>
<option>Admin</option>
<option>Bursar</option>
<option>Teacher</option>
<option>Receptionist</option>
</select>
</div>

<div>
<label>Assigned Grade</label>
<select name="assigned_grade">
<option value="">None</option>
{% for g in grades %}
<option>{{ g }}</option>
{% endfor %}
</select>
</div>

</div>

<hr>

<h3>Create Login Account</h3>

<p>

<label>

<input
type="checkbox"
name="create_login"
value="yes"
style="width:auto;">

Create login account for this staff member

</label>

</p>

<div class="two">

<div>
<label>Username</label>
<input
name="username"
placeholder="teacheramina">
</div>

<div>
<label>Temporary Password</label>
<input
name="password"
type="text"
placeholder="123456">
</div>

</div>

<p>

<label>

<input
type="checkbox"
name="force_password_change"
value="yes"
checked
style="width:auto;">

Force password change on first login

</label>

</p>

<br>

<button class="btn">

Add Staff

</button>

</form>
