{% extends "base.html" %}
{% block content %}

<style>
.stock-page{
    max-width:900px;
    margin:0 auto;
}

.stock-hero{
    background:linear-gradient(135deg,#dc2626,#ea580c);
    color:white;
    border-radius:18px;
    padding:22px;
    margin-bottom:16px;
}

.stock-hero h2{
    margin:0;
    font-size:27px;
}

.stock-hero p{
    margin:6px 0 0;
    color:#fff7ed;
}

.stock-card{
    background:white;
    border-radius:16px;
    padding:18px;
    box-shadow:0 6px 18px rgba(15,23,42,.07);
    border:1px solid #e5e7eb;
    margin-bottom:16px;
}

.form-grid-2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.stock-actions{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
}

.info-box{
    background:#fff7ed;
    color:#9a3412;
    border:1px solid #fed7aa;
    padding:12px;
    border-radius:12px;
    margin-bottom:14px;
    font-size:14px;
}

@media(max-width:800px){
    .form-grid-2{
        grid-template-columns:1fr;
    }
}
</style>

<div class="stock-page">

    <div class="stock-hero">
        <h2>Stock Out</h2>
        <p>Issue store items to departments, teachers, offices or classes.</p>
    </div>

    <div class="stock-card">

        <div class="info-box">
            Use this page when issuing items from the store. The system will reduce the available stock automatically.
        </div>

        <form method="post">

            <label>Select Item</label>
            <select name="item_id" required>
                <option value="">Choose inventory item</option>
                {% for item in items %}
                <option value="{{ item.id }}">
                    {{ item.item_name }} - Available: {{ item.quantity }} {{ item.unit }}
                </option>
                {% endfor %}
            </select>

            <div class="form-grid-2">
                <div>
                    <label>Quantity Issued</label>
                    <input name="quantity" type="number" min="1" required>
                </div>

                <div>
                    <label>Issued To</label>
                    <input name="issued_to" placeholder="e.g. Grade 4, ICT Office, Teacher Ahmed" required>
                </div>
            </div>

            <div class="form-grid-2">
                <div>
                    <label>Reference</label>
                    <input name="reference" placeholder="Issue note / request no.">
                </div>

                <div>
                    <label>Reason</label>
                    <input name="remarks" placeholder="e.g. Classroom use, cleaning, repair">
                </div>
            </div>

            <div class="stock-actions">
                <a class="btn gray" href="/inventory">
                    Back to Inventory
                </a>

                <button class="btn red" type="submit">
                    Save Stock Out
                </button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
