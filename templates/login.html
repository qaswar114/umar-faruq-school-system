<!doctype html>
<html>
<head>
    <title>EduManage Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#0b5ed7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="EduManage">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='edumanage_logo.png') }}">

    <style>
        *{box-sizing:border-box;margin:0;padding:0}

        body{
            font-family:Arial,sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0b5ed7,#16a34a);
            padding:20px;
        }

        .login-card{
            width:100%;
            max-width:500px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,.15);
        }

        .logo-area{text-align:center;margin-bottom:25px}

        .logo-area img{
            width:130px;
            height:auto;
            margin-bottom:12px;
        }

        .brand{
            font-size:46px;
            font-weight:800;
            margin-bottom:8px;
        }

        .edu{color:#2563eb}
        .manage{color:#16a34a}

        .tagline{
            color:#64748b;
            font-size:17px;
            margin-bottom:20px;
        }

        .flash{
            background:#fff7d6;
            color:#7c5c00;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        }

        label{
            display:block;
            margin-bottom:6px;
            font-weight:bold;
            color:#1e293b;
        }

        input{
            width:100%;
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:10px;
            margin-bottom:18px;
            font-size:16px;
        }

        input:focus{
            outline:none;
            border-color:#2563eb;
        }

        button{
            width:100%;
            border:none;
            background:#0b5ed7;
            color:white;
            padding:15px;
            font-size:18px;
            font-weight:bold;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{background:#084298}

        .footer{
            text-align:center;
            margin-top:25px;
            color:#64748b;
            font-size:14px;
        }

        @media(max-width:600px){
            .login-card{padding:25px}
            .brand{font-size:38px}
            .logo-area img{width:105px}
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo-area">
        <img src="{{ url_for('static', filename='edumanage_logo.png') }}"
             alt="EduManage Logo">

        <div class="brand">
            <span class="edu">Edu</span><span class="manage">Manage</span>
        </div>

        <div class="tagline">
            Smart School Management System
        </div>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post">
        <label>Username</label>
        <input name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        © 2026 EduManage SaaS Platform
    </div>

</div>

<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
        navigator.serviceWorker.register("/static/service-worker.js");
    });
}
</script>

</body>
</html>
