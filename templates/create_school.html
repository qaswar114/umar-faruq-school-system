{% extends "base.html" %}
{% block content %}

<div class="panel">

<h2>Create New School</h2>
<div class="notice">Fill this form once to create a new school, its branding, subscription status, and first admin account.</div>

<form method="POST" enctype="multipart/form-data">

<h3>1. School Information</h3>

<label>School Name</label>
<input type="text" name="school_name" placeholder="e.g. Green Valley Academy" required>

<label>Motto</label>
<input type="text" name="motto" placeholder="e.g. Knowledge and Discipline">

<label>Phone</label>
<input type="text" name="phone" placeholder="e.g. 0720000000">

<label>Email</label>
<input type="email" name="email" placeholder="e.g. school@email.com">

<label>Address</label>
<textarea name="address" style="width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:8px;"></textarea>

<hr>

<h3>2. Branding</h3>

<label>School Logo</label>
<input type="file" name="logo" accept="image/*">

<label>School Stamp</label>
<input type="file" name="stamp" accept="image/*">

<label>Headteacher Signature</label>
<input type="file" name="headteacher_signature" accept="image/*">

<div class="two">
    <div>
        <label>Primary Colour</label>
        <input type="color" name="primary_color" value="#0b5ed7">
    </div>

    <div>
        <label>Secondary Colour</label>
        <input type="color" name="secondary_color" value="#ffffff">
    </div>
</div>

<hr>

<h3>3. Subscription</h3>

<label>Subscription Status</label>
<select name="subscription_status">
    <option value="trial">Trial</option>
    <option value="active">Active</option>
    <option value="expired">Expired</option>
</select>

<hr>

<h3>4. School Administrator</h3>

<label>Admin Username</label>
<input type="text" name="admin_username" placeholder="e.g. greenvalleyadmin" required>

<label>Admin Password</label>
<input type="password" name="admin_password" placeholder="Enter secure password" required>

<br>

<button type="submit">Create School</button>
<a href="{{ url_for('schools') }}" class="btn" style="background:#6c757d;">Cancel</a>

</form>

</div>

{% endblock %}
