
<!doctype html>
<html>
<head>
<title>{{ settings.school_name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#f3f6fb;color:#1f2937}.header{background:#0b5ed7;color:white;padding:14px 22px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.brand{display:flex;align-items:center;gap:10px}.logo-small{width:58px;height:58px;object-fit:contain;background:white;border-radius:50%;padding:3px;transform:rotate(90deg)}.logo-large{width:120px;height:120px;object-fit:contain;display:block;margin:0 auto 8px;transform:rotate(90deg)}.login-logo{width:110px;height:110px;object-fit:contain;display:block;margin:0 auto 10px;transform:rotate(90deg)}.nav a{color:white;text-decoration:none;margin:0 6px;font-weight:bold}.container{max-width:1200px;margin:22px auto;padding:0 14px}.panel{background:white;border-radius:14px;padding:20px;box-shadow:0 8px 25px rgba(0,0,0,.08);margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card{background:#eef5ff;border-left:5px solid #0b5ed7;border-radius:12px;padding:16px}.amount{font-size:28px;font-weight:bold}label{font-weight:bold;font-size:14px}input,select,textarea{width:100%;padding:10px;margin:5px 0 13px;border:1px solid #cbd5e1;border-radius:8px;box-sizing:border-box}.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.btn{background:#0b5ed7;color:white;border:0;padding:10px 14px;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block}.green{background:#198754}.gray{background:#64748b}table{width:100%;border-collapse:collapse;margin-top:12px;background:white}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}th{background:#f1f5f9}.notice{background:#fff3cd;padding:10px;border-radius:8px;margin-bottom:12px}.receipt,.statement{max-width:760px;margin:auto;background:white;border:2px solid #111;padding:25px}.receipt h2,.receipt h3,.statement h2,.statement h3{text-align:center;margin:5px}@media(max-width:750px){.two,.three{grid-template-columns:1fr}th,td{font-size:12px;padding:6px}}@media print{.header,.no-print,.panel:not(.print-area){display:none!important}.container{margin:0;max-width:none}.receipt,.statement{border:1px solid #111}}
</style>
<script>
function updateMonths(termId, monthId){
  const months={"Term 1":["January","February","March"],"Term 2":["May","June","July"],"Term 3":["September","October","November"]};
  const t=document.getElementById(termId).value;
  document.getElementById(monthId).innerHTML=months[t].map(m=>`<option>${m}</option>`).join("");
}
</script>
</head>
<body>
{% if session.username %}
<div class="header">
  <div class="brand"><img src="{{ url_for('static', filename='logo.png') }}" class="logo-small"><div><strong>{{ settings.school_name }}</strong><br><small>School Fees System</small></div></div>
  <div class="nav">
    {{ session.username }} ({{ session.role }})
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('pupils') }}">Pupils</a>
    <a href="{{ url_for('fees') }}">Fees</a>
    <a href="{{ url_for('discounts') }}">Discounts</a>
    <a href="{{ url_for('payments') }}">Payments</a>
    <a href="{{ url_for('balances') }}">Balances</a>
    <a href="{{ url_for('statements') }}">Statements</a>
    <a href="{{ url_for('settings') }}">Branding</a>
    <a href="{{ url_for('logout') }}">Logout</a>
  </div>
</div>
{% endif %}
<div class="container">
{% for m in get_flashed_messages() %}<div class="notice">{{ m }}</div>{% endfor %}
{% block content %}{% endblock %}
</div>
</body>
</html>
