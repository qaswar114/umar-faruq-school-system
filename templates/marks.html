{% extends "base.html" %}
{% block content %}

<div class="panel">
    <h2>Marks Entry</h2>

    <form method="get">
        <div class="three">
            <div>
                <label>Exam</label>
                <select name="exam_id" required>
                    <option value="">Select Exam</option>
                    {% for e in exams %}
                    <option value="{{ e.id }}" {% if selected_exam|string == e.id|string %}selected{% endif %}>
                        {{ e.exam_name }} - {{ e.grade }} - {{ e.term }} {{ e.academic_year }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Subject</label>
                <select name="subject_id" required>
                    <option value="">Select Subject</option>
                    {% for s in subjects %}
                    <option value="{{ s.id }}" {% if selected_subject|string == s.id|string %}selected{% endif %}>
                        {{ s.subject_name }} - {{ s.grade }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Grade/Class</label>
                <select name="grade" required>
                    <option value="">Select Grade</option>
                    {% for g in grades %}
                    <option {% if selected_grade == g %}selected{% endif %}>{{ g }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <button class="btn">Load Pupils</button>
    </form>
</div>

{% if pupils %}
<div class="panel">
    <h3>Enter Marks</h3>

    <form method="post">
        <input type="hidden" name="exam_id" value="{{ selected_exam }}">
        <input type="hidden" name="subject_id" value="{{ selected_subject }}">
        <input type="hidden" name="grade" value="{{ selected_grade }}">

        <table>
            <tr>
                <th>#</th>
                <th>Pupil</th>
                <th>Admission No</th>
                <th>Marks</th>
                <th>Teacher Remark</th>
            </tr>

            {% for p in pupils %}
            {% set m = existing_marks.get(p.id) %}
            <tr>
                <td>{{ loop.index }}</td>
                <td>{{ p.full_name }}</td>
                <td>{{ p.admission_no }}</td>
                <td>
                    <input type="number" step="0.01" name="mark_{{ p.id }}"
                           value="{{ m.marks_obtained if m else '' }}">
                </td>
                <td>
                    <input name="remark_{{ p.id }}"
                           value="{{ m.teacher_remark if m else '' }}"
                           placeholder="Good, Fair, Needs improvement">
                </td>
            </tr>
            {% endfor %}
        </table>

        <br>
        <button class="btn green">Save Marks</button>
    </form>
</div>
{% endif %}

{% endblock %}
