{% extends "base.html" %}{% block content %}<div class="panel"><h2>Parent Statement</h2><form onsubmit="event.preventDefault(); location.href='/statement/'+document.getElementById('pupil').value+'/'+document.getElementById('year').value;"><div class="two"><div><label>Pupil</label><select id="pupil">{% for p in pupils %}<option value="{{p.id}}">{{p.admission_no}} - {{p.full_name}}</option>{% endfor %}</select></div><div><label>Academic Year</label><input id="year" type="number" value="{{year}}"></div></div><button class="btn green">Generate Statement</button></form></div>{% endblock %}
