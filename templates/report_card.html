{% extends "base.html" %}
{% block content %}

<style>
@media print {
    @page {
        size: A4;
        margin: 5mm;
    }

    body {
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    body > *:not(.report-card) {
        display: none !important;
    }

    .no-print {
        display: none !important;
    }

    .report-card {
        display: block !important;
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        margin: 0 !important;
        padding: 6px !important;
        box-shadow: none !important;
        border: 2px solid #000 !important;
        font-size: 10.5px !important;
        page-break-after: avoid !important;
        page-break-inside: avoid !important;
    }

    .report-table th,
    .report-table td {
        padding: 2px !important;
        font-size: 10px !important;
    }

    .remarks-box {
        min-height: 25px !important;
        margin-top: 5px !important;
        padding: 4px !important;
    }

    .signature-grid {
        margin-top: 10px !important;
    }

    .stamp-box {
        height: 38px !important;
        padding-top: 8px !important;
        margin-top: 6px !important;
    }
}

<div class="no-print" style="margin-bottom:15px;">
    <button onclick="window.print()" class="btn">Print Report Card</button>
    <a href="{{ url_for('report_cards') }}" class="btn">Back</a>
</div>

<div class="report-card">

    <div class="report-header">
        <img src="{{ url_for('static', filename='logo.png') }}" class="report-logo">
        <div class="report-title">{{ settings.school_name }}</div>
        <div>{{ settings.address }}</div>
        <div>{{ settings.phone }}</div>
        <div class="report-subtitle">OFFICIAL PUPIL REPORT CARD</div>
    </div>

    <div class="info-grid">
        <div><b>Pupil Name:</b> {{ pupil.full_name }}</div>
        <div><b>Admission No:</b> {{ pupil.admission_no }}</div>
        <div><b>Grade/Class:</b> {{ pupil.grade }}</div>
        <div><b>Gender:</b> {{ pupil.gender }}</div>
        <div><b>Exam:</b> {{ exam.exam_name }}</div>
        <div><b>Term:</b> {{ exam.term }}</div>
        <div><b>Academic Year:</b> {{ exam.academic_year }}</div>
        <div><b>Date Printed:</b> {{ today }}</div>
    </div>

    <table class="report-table">
        <tr>
            <th>#</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Teacher Remark</th>
        </tr>

        {% for m in marks %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ m.subject.subject_name }}</td>
            <td>{{ m.marks_obtained }}</td>
            <td>{{ m.teacher_remark }}</td>
        </tr>
        {% else %}
        <tr>
            <td colspan="4" style="text-align:center;">No marks entered yet.</td>
        </tr>
        {% endfor %}
    </table>

    <div class="summary-grid">
        <div class="summary-box">Total<br>{{ total }}</div>
        <div class="summary-box">Average<br>{{ "%.2f"|format(average) }}</div>
        <div class="summary-box">Grade<br>{{ grade_letter }}</div>
        <div class="summary-box">Position<br>{{ position }} / {{ class_size }}</div>
    </div>

    <div class="remarks-box">
        <b>Class Teacher Remarks:</b><br>
        {% if average >= 80 %}
            Excellent performance. Keep it up.
        {% elif average >= 70 %}
            Very good performance. Continue working hard.
        {% elif average >= 60 %}
            Good performance. More effort will improve the results.
        {% elif average >= 50 %}
            Fair performance. Needs more revision and guidance.
        {% else %}
            Needs serious improvement and close academic support.
        {% endif %}
    </div>

    <div class="remarks-box">
    <b>Head Teacher Remarks:</b> Promoted to next grade.
  </div>

    <div class="signature-grid">
         <div class="signature-line">Class Teacher</div>
         <div class="signature-line">Head Teacher</div>
         <div class="signature-line">Parent</div>
   </div>

    <div class="stamp-box">
        SCHOOL STAMP
    </div>

</div>

{% endblock %}
