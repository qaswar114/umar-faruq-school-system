<!DOCTYPE html>
<html>
<head>
    <title>Report Card</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#fff;
            margin:0;
            padding:20px;
        }

        .report-card{
            width:800px;
            margin:auto;
            border:2px solid #000;
            padding:10px;
        }

        .print-btn{
            text-align:center;
            margin:15px;
        }

        @media print{
            .print-btn{
                display:none;
            }

            body{
                margin:0;
                padding:0;
            }

            .report-card{
                width:100%;
                border:2px solid #000;
                box-shadow:none;
            }
        }
    </style>
</head>

<body>

<div class="print-btn">
    <button onclick="window.print()">Print Report Card</button>
</div>

<div class="report-card">

    <!-- SCHOOL LOGO -->

    <center>
        <img src="{{ url_for('static', filename='logo.png') }}"
             width="60">
        <h3>UMAR FARUQ INTEGRATED ACADEMY</h3>
        <h4>OFFICIAL PUPIL REPORT CARD</h4>
    </center>

    <!-- KEEP ALL YOUR CURRENT REPORT CARD TABLES HERE -->

</div>

</body>
</html>
